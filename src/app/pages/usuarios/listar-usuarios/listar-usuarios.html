<div class="page-header">
  <div>
    <h1>Usuarios</h1>
    <p>Gestiona las cuentas registradas en la plataforma.</p>
  </div>
</div>

<div class="card">
  <mat-form-field appearance="outline" class="search-field">
    <mat-label>Buscar</mat-label>
    <input matInput placeholder="Nombre, correo o usuario..." (keyup)="aplicarFiltro($event)" />
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>

  <div *ngIf="loading" class="loading-box">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <div class="table-wrapper" *ngIf="!loading">
    <table mat-table [dataSource]="dataSource" matSort class="wb-table">
      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Nombre</th>
        <td mat-cell *matCellDef="let u">{{ u.nombre }}</td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Correo</th>
        <td mat-cell *matCellDef="let u">{{ u.email }}</td>
      </ng-container>

      <ng-container matColumnDef="username">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Usuario</th>
        <td mat-cell *matCellDef="let u">{{ u.username }}</td>
      </ng-container>

      <ng-container matColumnDef="roles">
        <th mat-header-cell *matHeaderCellDef>Rol</th>
        <td mat-cell *matCellDef="let u">
          <mat-chip-set>
            <mat-chip *ngFor="let r of u.roles" [class.chip-admin]="r.rol === 'ADMIN'">
              {{ r.rol }}
            </mat-chip>
          </mat-chip-set>
        </td>
      </ng-container>

      <ng-container matColumnDef="estado">
        <th mat-header-cell *matHeaderCellDef>Estado</th>
        <td mat-cell *matCellDef="let u">
          <button
            mat-stroked-button
            class="estado-btn"
            [class.activo]="u.statusUsuario"
            (click)="toggleEstado(u)"
            matTooltip="Cambiar estado"
          >
            <mat-icon>{{ u.statusUsuario ? 'check_circle' : 'cancel' }}</mat-icon>
            {{ u.statusUsuario ? 'Activo' : 'Inactivo' }}
          </button>
        </td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let u">
          <button
            mat-icon-button
            [routerLink]="['/app/usuarios/editar', u.idUsuario]"
            matTooltip="Editar"
          >
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button (click)="eliminar(u)" matTooltip="Eliminar" class="delete-icon">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell no-data" [attr.colspan]="displayedColumns.length">
          No se encontraron usuarios.
        </td>
      </tr>
    </table>

    <mat-paginator [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons></mat-paginator>
  </div>
</div>
