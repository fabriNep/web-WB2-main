<div class="page-header">
  <div>
    <h1>Empleados</h1>
    <p>Gestiona los empleados registrados en las empresas.</p>
  </div>
  <button class="wb-btn-primary" routerLink="/app/empleados/crear">
    <mat-icon>add</mat-icon> Nuevo empleado
  </button>
</div>

<div class="card">
  <mat-form-field appearance="outline" class="search-field">
    <mat-label>Buscar</mat-label>
    <input matInput placeholder="Nombre, cargo..." (keyup)="aplicarFiltro($event)" />
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>

  <div *ngIf="loading" class="loading-box">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <div class="table-wrapper" *ngIf="!loading">
    <table mat-table [dataSource]="dataSource" matSort class="wb-table">
      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Nombre</th>
        <td mat-cell *matCellDef="let e">{{ e.usuario?.nombre }}</td>
      </ng-container>

      <ng-container matColumnDef="empresa">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Empresa</th>
        <td mat-cell *matCellDef="let e">{{ e.empresa?.nombre }}</td>
      </ng-container>

      <ng-container matColumnDef="cargo">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Cargo</th>
        <td mat-cell *matCellDef="let e">{{ e.cargo }}</td>
      </ng-container>

      <ng-container matColumnDef="estado">
        <th mat-header-cell *matHeaderCellDef>Estado</th>
        <td mat-cell *matCellDef="let e">
          <mat-chip [class.chip-activo]="e.estado" [class.chip-inactivo]="!e.estado">
            {{ e.estado ? 'Activo' : 'Inactivo' }}
          </mat-chip>
        </td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let e">
          <button
            mat-icon-button
            [routerLink]="['/app/empleados/editar', e.idEmpleado]"
            matTooltip="Editar"
          >
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button (click)="eliminar(e)" matTooltip="Eliminar" class="delete-icon">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell no-data" [attr.colspan]="displayedColumns.length">
          No se encontraron empleados.
        </td>
      </tr>
    </table>

    <mat-paginator [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons></mat-paginator>
  </div>
</div>
