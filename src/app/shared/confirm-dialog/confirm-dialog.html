<div class="dialog-icon" [class.danger]="data.danger">
  <mat-icon>{{ data.danger ? 'warning' : 'help_outline' }}</mat-icon>
</div>

<h2 mat-dialog-title>{{ data.title }}</h2>
<mat-dialog-content>{{ data.message }}</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button [mat-dialog-close]="false">{{ data.cancelText || 'Cancelar' }}</button>
  <button
    mat-flat-button
    [mat-dialog-close]="true"
    [class.wb-btn-danger]="data.danger"
    [class.wb-btn-primary]="!data.danger"
  >
    {{ data.confirmText || 'Confirmar' }}
  </button>
</mat-dialog-actions>
